<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Overdrive: Ultra Offline</title>
    <style>
        /* OFFLINE FONT STACK (Uses built-in sci-fi fonts) */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', 'Segoe UI', 'Impact', sans-serif;
            touch-action: none;
            user-select: none;
            color: white;
        }

        /* LOCAL REPLACEMENTS FOR TAILWIND CLASSES */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .absolute { position: absolute; }
        .inset-0 { position: absolute; top: 0; right: 0; bottom: 0; left: 0; }
        .p-6 { padding: 1.5rem; }
        .p-12 { padding: 3rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-12 { margin-bottom: 3rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .text-6xl { font-size: 3.75rem; line-height: 1; }
        .text-8xl { font-size: 6rem; line-height: 1; }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }
        .uppercase { text-transform: uppercase; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .tracking-widest { letter-spacing: 0.1em; }
        .hidden { display: none; }

        /* GAME SPECIFIC STYLES */
        canvas { display: block; filter: saturate(1.4) contrast(1.05); }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .glow-text { text-shadow: 0 0 10px currentColor; }
        .text-cyan-400 { color: #22d3ee; }
        .text-fuchsia-500 { color: #d946ef; }
        .text-red-500 { color: #ef4444; }

        .menu-btn {
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.1s ease;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            padding: 1.5rem 5rem;
            border-radius: 2px;
            color: white;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 1.875rem;
            font-weight: 900;
        }

        .menu-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            filter: brightness(1.2);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }

        #overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
        }

        #flash-overlay {
            position: fixed; inset: 0; background: white; opacity: 0;
            pointer-events: none; z-index: 50;
        }

        .health-segment {
            height: 12px;
            width: 40px;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            transition: all 0.3s ease;
        }

        .health-lost {
            background: #333;
            box-shadow: none;
            opacity: 0.3;
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="ui-layer">
        <div class="flex justify-between p-6">
            <div class="text-cyan-400 glow-text">
                <p class="mb-1 uppercase" style="letter-spacing: 0.4em; font-size: 10px;">Total Eradication</p>
                <h1 id="score-display" class="text-6xl font-black italic tracking-tighter">0</h1>
                <div class="flex gap-2 mt-4" id="health-bar" style="gap: 8px;">
                    <div class="health-segment"></div>
                    <div class="health-segment"></div>
                    <div class="health-segment"></div>
                    <div class="health-segment"></div>
                    <div class="health-segment"></div>
                </div>
            </div>
            <div class="text-right">
                <p id="mult-label" class="mb-1 uppercase" style="letter-spacing: 0.4em; font-size: 10px; color: #f472b6;">Sync Multiplier</p>
                <h1 id="mult-display" class="text-6xl font-black italic text-fuchsia-500 glow-text">x1.0</h1>
            </div>
        </div>

        <div id="overlay" class="inset-0 flex flex-col items-center justify-center" style="pointer-events: auto;">
            <div id="start-screen" class="text-center p-12">
                <h1 class="text-8xl font-black mb-4 italic" style="background: linear-gradient(to bottom, #fff, #22d3ee, #c026d3); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEON<br>OVERDRIVE</h1>
                <p class="mb-12 text-cyan-300 font-bold uppercase animate-pulse" style="letter-spacing: 0.5em; font-size: 14px;">Neural Link Ready</p>
                <button id="start-btn" class="menu-btn">INITIALIZE</button>
            </div>

            <div id="game-over-screen" class="hidden text-center">
                <h2 class="text-8xl font-black mb-4 text-red-500 italic glow-text">CRITICAL FAILURE</h2>
                <p id="final-score" class="text-6xl mb-12 text-white font-black italic">SCORE: 0</p>
                <button id="restart-btn" class="menu-btn">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- ALL JAVASCRIPT REMAINS THE SAME (Works Offline) ---
        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playShoot(isOverdrive = false) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = isOverdrive ? 'sawtooth' : 'square';
                osc.frequency.setValueAtTime(isOverdrive ? 150 : 800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(isOverdrive ? 0.2 : 0.05, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playExplosion(isElite = false) {
                if (!this.ctx) return;
                const noise = this.ctx.createBufferSource();
                const bufferSize = this.ctx.sampleRate * 0.2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(isElite ? 400 : 800, this.ctx.currentTime);
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(isElite ? 0.6 : 0.3, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                noise.start();
            },
            playHit() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(60, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playNeutralize() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(2000, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash-overlay');
        const scoreDisplay = document.getElementById('score-display');
        const multDisplay = document.getElementById('mult-display');
        const overlay = document.getElementById('overlay');
        const healthSegments = document.querySelectorAll('.health-segment');
        
        let gameActive = false, score = 0, multiplier = 1.0, lastTime = 0;
        let spawnTimer = 0, shake = 0, hitStop = 0, overdrive = 0, health = 5;
        let player, enemies = [], bullets = [], enemyBullets = [], particles = [], stars = [], popups = [];

        const config = { baseSpawnRate: 700, playerSpeed: 520, bulletSpeed: 1600, enemyBulletSpeed: 450, enemySpeed: 140, stopDistance: 280 };
        const mouse = { x: 0, y: 0, down: false };
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => { if (gameActive) mouse.down = true; });
        window.addEventListener('mouseup', () => { mouse.down = false; });
        window.addEventListener('touchstart', e => {
            if (gameActive) {
                mouse.down = true;
                mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
            }
        }, { passive: false });
        window.addEventListener('touchmove', e => {
            if (gameActive) {
                mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
            }
        }, { passive: false });
        window.addEventListener('touchend', () => mouse.down = false);

        function triggerFlash(intensity = 0.2, color = 'white') {
            flash.style.background = color;
            flash.style.transition = 'none';
            flash.style.opacity = intensity;
            setTimeout(() => {
                flash.style.transition = 'opacity 0.4s ease-out';
                flash.style.opacity = 0;
            }, 20);
        }

        function updateHealthUI() {
            healthSegments.forEach((seg, i) => {
                if (i < health) seg.classList.remove('health-lost');
                else seg.classList.add('health-lost');
            });
        }

        class Popup {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -4;
            }
            update() { this.y += this.vy; this.vy *= 0.9; this.life -= 0.03; }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = `italic 900 ${24 + (1-this.life)*20}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, speedScale = 1) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 10 + 4) * speedScale;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.04 + 0.02;
                this.size = Math.random() * 4 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.95; this.vy *= 0.95;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        class Bullet {
            constructor(x, y, angle, isOverdrive = false) {
                this.x = x; this.y = y;
                const speed = isOverdrive ? config.bulletSpeed * 1.4 : config.bulletSpeed;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = isOverdrive ? '#ff00ff' : '#00ffff';
                this.radius = isOverdrive ? 10 : 5;
            }
            update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; }
            draw() {
                ctx.shadowBlur = 8; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        class EnemyBullet {
            constructor(x, y, angle) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * config.enemyBulletSpeed;
                this.vy = Math.sin(angle) * config.enemyBulletSpeed;
                this.radius = 8; this.color = '#ff3333';
            }
            update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; }
            draw() {
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Enemy {
            constructor() {
                this.radius = 18 + Math.random() * 22;
                this.reset();
                this.color = `hsl(${Math.random() < 0.2 ? 300 : 180 + Math.random()*40}, 100%, 60%)`;
                this.hp = Math.ceil(this.radius / 8);
                this.isElite = Math.random() < 0.2;
                if(this.isElite) { this.color = '#fff'; this.hp *= 2.5; }
                this.fireTimer = Math.random() * 2;
                this.fireRate = this.isElite ? 1.0 : 2.0;
            }
            reset() {
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = -50; this.y = Math.random() * canvas.height; }
                else if (side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                else if (side === 2) { this.x = Math.random() * canvas.width; this.y = -50; }
                else { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
            }
            update(dt) {
                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                if (dist > config.stopDistance) {
                    const speed = (config.enemySpeed + (multiplier * 10)) * (this.isElite ? 1.5 : 1);
                    this.x += Math.cos(angle) * speed * dt; this.y += Math.sin(angle) * speed * dt;
                }
                this.fireTimer -= dt;
                if (this.fireTimer <= 0) {
                    this.shoot();
                    this.fireTimer = this.fireRate / (1 + multiplier * 0.1);
                }
            }
            shoot() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                if (this.isElite) {
                    enemyBullets.push(new EnemyBullet(this.x, this.y, angle - 0.2));
                    enemyBullets.push(new EnemyBullet(this.x, this.y, angle));
                    enemyBullets.push(new EnemyBullet(this.x, this.y, angle + 0.2));
                } else {
                    enemyBullets.push(new EnemyBullet(this.x, this.y, angle));
                }
            }
            draw() {
                ctx.shadowBlur = 12; ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.isElite ? 6 : 3;
                if (this.fireTimer < 0.3) { ctx.strokeStyle = '#fff'; ctx.shadowColor = '#fff'; }
                ctx.strokeRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            }
        }

        class Player {
            constructor() {
                this.x = canvas.width / 2; this.y = canvas.height / 2;
                this.radius = 22; this.cooldown = 0; this.fireRate = 0.06; this.invuln = 0;
            }
            update(dt) {
                let mx = 0, my = 0;
                if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
                if (keys['KeyS'] || keys['ArrowDown']) my += 1;
                if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
                if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
                if (mx !== 0 || my !== 0) {
                    const mag = Math.hypot(mx, my);
                    this.x += (mx / mag) * config.playerSpeed * dt;
                    this.y += (my / mag) * config.playerSpeed * dt;
                }
                this.x = Math.max(20, Math.min(canvas.width - 20, this.x));
                this.y = Math.max(20, Math.min(canvas.height - 20, this.y));
                if (this.cooldown > 0) this.cooldown -= dt;
                if (this.invuln > 0) this.invuln -= dt;
                if (mouse.down && this.cooldown <= 0) this.shoot();
            }
            shoot() {
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                AudioEngine.playShoot(overdrive > 0);
                if (overdrive > 0) {
                    for(let i=-2; i<=2; i++) bullets.push(new Bullet(this.x, this.y, angle + i*0.12, true));
                    this.cooldown = this.fireRate * 0.4;
                    shake = 8;
                } else {
                    bullets.push(new Bullet(this.x, this.y, angle));
                    this.cooldown = this.fireRate;
                    shake = 3;
                }
            }
            draw() {
                if (this.invuln > 0 && Math.floor(Date.now() / 50) % 2 === 0) return;
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(angle);
                ctx.shadowBlur = 15;
                ctx.shadowColor = overdrive > 0 ? '#ff00ff' : '#00ffff';
                ctx.strokeStyle = overdrive > 0 ? '#ff00ff' : '#fff';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(35, 0); ctx.lineTo(-20, -22); ctx.lineTo(-10, 0); ctx.lineTo(-20, 22);
                ctx.closePath(); ctx.stroke();
                ctx.restore();
            }
        }

        function takeDamage() {
            if (player.invuln > 0) return;
            health--;
            AudioEngine.playHit(); updateHealthUI();
            player.invuln = 1.0; hitStop = 15; shake = 40;
            multiplier = Math.max(1.0, multiplier - 1.0);
            triggerFlash(0.5, 'red');
            if (health <= 0) endGame();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, z: Math.random() * 2 + 1 });
            }
        }

        function gameLoop(timestamp) {
            const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
            lastTime = timestamp;
            if (hitStop > 0) { hitStop--; requestAnimationFrame(gameLoop); return; }
            ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.88; }
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.y += s.z * (2.5 + multiplier * 0.8);
                if (s.y > canvas.height) s.y = 0;
                ctx.globalAlpha = 0.08 * s.z; ctx.fillRect(s.x, s.y, s.z, s.z);
            });
            ctx.globalAlpha = 1;
            if (gameActive) {
                if (overdrive > 0) overdrive -= dt;
                player.update(dt); player.draw();
                spawnTimer += dt * 1000;
                if (spawnTimer > config.baseSpawnRate / (1 + multiplier * 0.3)) {
                    enemies.push(new Enemy()); spawnTimer = 0;
                }
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i]; b.update(dt); b.draw();
                    enemies.forEach((e, ei) => {
                        if (Math.hypot(e.x - b.x, e.y - b.y) < e.radius + b.radius) {
                            e.hp--; bullets.splice(i, 1);
                            if (e.hp <= 0) {
                                AudioEngine.playExplosion(e.isElite);
                                enemies.splice(ei, 1);
                                hitStop = e.isElite ? 6 : 3;
                                shake = e.isElite ? 30 : 12;
                                if(e.isElite) overdrive = 7;
                                score += Math.floor(100 * multiplier);
                                multiplier += 0.15;
                                popups.push(new Popup(e.x, e.y, `+${Math.floor(100*multiplier)}`, e.color));
                                for(let j=0; j<20; j++) particles.push(new Particle(e.x, e.y, e.color));
                                scoreDisplay.innerText = score;
                            }
                        }
                    });
                }
                enemyBullets.forEach((eb, i) => {
                    eb.update(dt); eb.draw();
                    if (Math.hypot(eb.x - player.x, eb.y - player.y) < eb.radius + 15) {
                        takeDamage(); enemyBullets.splice(i, 1);
                    }
                });
                enemies.forEach((e, i) => {
                    e.update(dt); e.draw();
                    if (Math.hypot(e.x - player.x, e.y - player.y) < e.radius + 18) {
                        takeDamage(); enemies.splice(i, 1);
                    }
                });
                particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i, 1); });
                popups.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) popups.splice(i, 1); });
                if (multiplier > 1.0) multiplier -= 0.12 * dt;
                multDisplay.innerText = `x${multiplier.toFixed(1)}`;
            }
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            AudioEngine.init();
            gameActive = true; score = 0; multiplier = 1.0; overdrive = 0; health = 5;
            enemies = []; bullets = []; enemyBullets = []; particles = [];
            player = new Player(); updateHealthUI();
            overlay.classList.add('hidden');
        }

        function endGame() {
            gameActive = false;
            overlay.classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `FINAL ERADICATION: ${score}`;
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        initStars(); requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
